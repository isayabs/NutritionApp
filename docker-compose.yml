version: "3.8"

services:
  backend:
    build: ./Backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ./Frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_ORIGIN=http://backend:8000
    depends_on:
      - backend
